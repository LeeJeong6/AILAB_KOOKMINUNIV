<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary: #6A7C9C;
      --color-dark: #151D2A;
      --color-text: #000000;
      --color-text-secondary: #757575;
      --color-bg: #FFFFFF;
      --color-bg-secondary: #F7F7F7;
      --color-accent: #116dff;
      --color-border: #C7C7C7;

      --site-width: 980px;
      --border-radius: 5px;
      --shadow: 0 1px 4px rgba(0,0,0,.6);
      --transition: 0.4s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.4em;
    }

    .header {
      width: 100%;
      background: var(--color-bg);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-dark);
      margin: 0;
    }

    .lab-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: var(--color-primary);
      color: var(--color-bg);
      border-radius: var(--border-radius);
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background-color var(--transition);
    }

    .lab-link:hover {
      background: var(--color-dark);
    }

    .container {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 0 1rem;
    }

    .main {
      padding: 2rem 0 4rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--color-border);
    }

    .back-link {
      text-decoration: none;
      color: var(--color-primary);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--color-dark);
    }

    .category-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-dark);
    }

    .entry-list {
      display: grid;
      gap: 1.25rem;
    }

    .entry-card {
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      padding: 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: all var(--transition);
    }

    .entry-card:hover {
      box-shadow: var(--shadow);
    }

    .entry-meta {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.75rem;
    }

    .entry-title {
      font-size: 1.25rem;
      line-height: 1.35;
      color: var(--color-dark);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .entry-desc {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--color-text-secondary);
      white-space: pre-wrap;
      margin-bottom: 1rem;
    }

    .entry-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
    }

    .entry-actions a {
      text-decoration: none;
      border: 1px solid var(--color-primary);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      color: var(--color-primary);
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all var(--transition);
    }

    .entry-actions a:hover {
      background: var(--color-primary);
      color: var(--color-bg);
    }

    .entry-empty {
      border: 1px dashed var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg-secondary);
      padding: 2rem;
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      text-align: center;
    }

    footer {
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.85rem;
      padding: 2rem 1rem;
      background: var(--color-bg-secondary);
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .category-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="site-title">Lab Seminar Archive</h1>
      <a class="lab-link" href="https://ailab.kookmin.ac.kr/" target="_blank" rel="noreferrer noopener">KMU AI LAB</a>
    </div>
  </header>

  <main class="container main">
    <section class="toolbar">
      <a class="back-link" href="index.html">← 메인으로</a>
      <h2 class="category-title" id="categoryTitle"></h2>
    </section>

    <section class="entry-list" id="entryList"></section>
  </main>

  <footer>
    &copy; 2026 KMU AI Lab. All rights reserved.
  </footer>

  <script>
    const CATEGORY_META = {
      paper: { label: '논문 세미나' },
      vibe: { label: '바이브코딩' },
      math: { label: '수학스터디' }
    };

    const STATIC_ENTRIES = [
      {
        id: 'seed-paper-2026-03-20',
        category: 'paper',
        date: '2026-03-20',
        presenter: '이정익',
        title: 'GroupViT: Semantic Segmentation Emerges from Text Supervision',
        description: '텍스트 감독 학습으로 세그멘테이션이 가능한 GroupViT 구조와 실험 결과를 정리한 세션.',
        fileName: '2026-03-20-groupvit.html',
        staticLink: '2026-03-20-groupvit.html',
        kind: 'seed',
        createdAt: '2026-03-20T09:00:00.000Z'
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const category = params.get('cat');

    if (!CATEGORY_META[category]) {
      window.location.replace('index.html');
      throw new Error('Invalid category parameter');
    }

    const categoryTitle = document.getElementById('categoryTitle');
    const entryList = document.getElementById('entryList');

    categoryTitle.textContent = CATEGORY_META[category].label;

    function loadEntries() {
      const entries = STATIC_ENTRIES
        .filter((entry) => entry.category === category)
        .map((entry) => ({
          ...entry,
          description: entry.description || '설명이 없습니다.'
        }));

      entries.sort((a, b) => {
        const dateCompare = String(b.date || '').localeCompare(String(a.date || ''));
        if (dateCompare !== 0) {
          return dateCompare;
        }
        return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      });

      return entries;
    }

    function createEntryNode(entry) {
      const card = document.createElement('article');
      card.className = 'entry-card';

      const meta = document.createElement('p');
      meta.className = 'entry-meta';
      meta.textContent = `${entry.date || '-'} · ${entry.presenter || '-'}`;

      const title = document.createElement('h3');
      title.className = 'entry-title';
      title.textContent = entry.title || '(제목 없음)';

      const desc = document.createElement('p');
      desc.className = 'entry-desc';
      desc.textContent = entry.description || '';

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      if (entry.kind === 'seed' && entry.staticLink) {
        const viewLink = document.createElement('a');
        viewLink.href = entry.staticLink;
        viewLink.textContent = '세션 보기';
        actions.appendChild(viewLink);
      }

      card.append(meta, title, desc);
      if (actions.children.length > 0) {
        card.appendChild(actions);
      }
      return card;
    }

    function renderEntries() {
      const entries = loadEntries();
      entryList.innerHTML = '';

      if (entries.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'entry-empty';
        empty.textContent = '아직 저장된 항목이 없습니다.';
        entryList.appendChild(empty);
        return;
      }

      entries.forEach((entry) => {
        entryList.appendChild(createEntryNode(entry));
      });
    }

    renderEntries();
  </script>
</body>
</html>
