<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2563eb;
      --blue-soft: #eef4ff;
      --line: #c9d9ff;
      --ink: #1a2233;
      --muted: #63708a;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--white);
      color: var(--ink);
      font-family: 'Gowun Dodum', sans-serif;
      scroll-behavior: smooth;
    }

    .top-ribbon {
      width: 100%;
      height: 84px;
      background: linear-gradient(90deg, #1f4fd0, #2f7dff);
    }

    .container {
      width: min(980px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .hero {
      margin-top: -42px;
      text-align: center;
      padding-bottom: 1.15rem;
    }

    .page-title {
      font-family: 'Gaegu', cursive;
      font-size: clamp(2.1rem, 5.2vw, 3.4rem);
      font-weight: 700;
      background: #fff;
      border: 2px solid #d2e0ff;
      border-radius: 999px;
      padding: 0.58rem 1.6rem;
      color: #17306e;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.14);
    }

    .lab-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 1rem;
      text-decoration: none;
      background: var(--blue);
      color: #fff;
      border-radius: 12px;
      padding: 0.68rem 1.9rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .lab-link:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .main {
      padding-bottom: 4rem;
      display: grid;
      gap: 1.2rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .back-link {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.35rem 0.84rem;
      color: #2452b8;
      background: #f6f9ff;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .category-title {
      font-family: 'Gaegu', cursive;
      font-size: clamp(2rem, 4.8vw, 3rem);
      color: #1f4cb0;
      line-height: 1;
    }

    .panel {
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--blue-soft);
      padding: 1rem;
      display: grid;
      gap: 0.85rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.72rem;
    }

    .field {
      display: grid;
      gap: 0.24rem;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.84rem;
      color: #4f6183;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #c2d4ff;
      border-radius: 10px;
      background: #fff;
      color: #1d2a42;
      padding: 0.56rem 0.68rem;
      font: inherit;
      resize: vertical;
    }

    textarea {
      min-height: 110px;
      line-height: 1.48;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .save-btn {
      border: none;
      border-radius: 10px;
      background: #1f52c5;
      color: #fff;
      padding: 0.58rem 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .save-msg {
      font-size: 0.84rem;
      color: #596b8b;
      min-height: 1.1em;
    }

    .entry-list {
      display: grid;
      gap: 0.72rem;
    }

    .entry-card {
      border: 1px solid #d4e0fa;
      border-radius: 14px;
      background: #fff;
      padding: 0.8rem 0.9rem;
      display: grid;
      gap: 0.38rem;
    }

    .entry-meta {
      font-size: 0.82rem;
      color: #6f7b93;
    }

    .entry-title {
      font-size: 1.13rem;
      line-height: 1.32;
      color: #172645;
      font-weight: 700;
    }

    .entry-desc {
      font-size: 0.93rem;
      line-height: 1.48;
      color: #3f4f67;
      white-space: pre-wrap;
    }

    .entry-file {
      font-size: 0.8rem;
      color: #61708b;
      border-top: 1px solid #e4ebfb;
      padding-top: 0.42rem;
    }

    .entry-actions {
      display: flex;
      gap: 0.44rem;
      flex-wrap: wrap;
    }

    .entry-actions button,
    .entry-actions a {
      text-decoration: none;
      border: 1px solid #b3c6f5;
      border-radius: 999px;
      background: #f6f9ff;
      color: #1f4ea8;
      padding: 0.28rem 0.72rem;
      font-size: 0.79rem;
      font-weight: 700;
      cursor: pointer;
    }

    .entry-actions .delete-btn {
      border-color: #dca5a5;
      color: #b03636;
      background: #fff6f6;
    }

    .entry-empty {
      border: 1px dashed #ccdbfb;
      border-radius: 12px;
      background: #fff;
      padding: 0.8rem 0.9rem;
      color: #71819d;
      font-size: 0.9rem;
    }

    footer {
      border-top: 1px solid #dce7ff;
      text-align: center;
      color: #70809b;
      font-size: 0.82rem;
      padding: 1rem 0 1.35rem;
    }

    @media (max-width: 700px) {
      .container {
        width: min(980px, calc(100% - 1.1rem));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="pageTop"></div>
  <div class="top-ribbon"></div>

  <header class="container hero">
    <button type="button" class="page-title" id="pageTitle">Lab Seminar Archive</button>
    <div>
      <a class="lab-link" href="https://ailab.kookmin.ac.kr/" target="_blank" rel="noreferrer noopener">KMU AI LAB</a>
    </div>
  </header>

  <main class="container main">
    <section class="toolbar">
      <a class="back-link" href="index.html">메인으로</a>
      <h1 class="category-title" id="categoryTitle"></h1>
    </section>

    <section class="panel">
      <form id="uploadForm" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="dateInput">날짜</label>
            <input id="dateInput" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="presenterInput">발표자</label>
            <input id="presenterInput" name="presenter" type="text" placeholder="예: 홍길동" required />
          </div>
          <div class="field field-full">
            <label for="titleInput">제목</label>
            <input id="titleInput" name="title" type="text" placeholder="제목을 입력하세요" required />
          </div>
          <div class="field field-full">
            <label for="descInput">설명</label>
            <textarea id="descInput" name="description" placeholder="노션 카드처럼 보일 설명을 입력하세요" required></textarea>
          </div>
          <div class="field field-full">
            <label for="fileInput">파일 (PDF, PPT, PPTX)</label>
            <input id="fileInput" name="file" type="file" accept=".pdf,.ppt,.pptx,application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" required />
          </div>
        </div>
        <div class="actions">
          <button class="save-btn" type="submit">저장</button>
          <span class="save-msg" id="saveMsg"></span>
        </div>
      </form>
    </section>

    <section class="entry-list" id="entryList"></section>
  </main>

  <footer>
    &copy; 2026 KMU AI Lab Seminar Archive
  </footer>

  <script>
    const DB_NAME = 'lab-seminar-archive-db';
    const DB_VERSION = 1;
    const UPLOAD_STORE = 'uploads';

    const CATEGORY_META = {
      paper: { label: '논문 세미나' },
      vibe: { label: '바이브코딩' },
      math: { label: '수학스터디' }
    };

    const STATIC_ENTRIES = [
      {
        id: 'seed-paper-2026-03-20',
        category: 'paper',
        date: '2026-03-20',
        presenter: '이정익',
        title: 'GroupViT: Semantic Segmentation Emerges from Text Supervision',
        description: '텍스트 감독 학습으로 세그멘테이션이 가능한 GroupViT 구조와 실험 결과를 정리한 세션.',
        fileName: '2026-03-20-groupvit.html',
        staticLink: '2026-03-20-groupvit.html',
        kind: 'seed',
        createdAt: '2026-03-20T09:00:00.000Z'
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const category = params.get('cat');

    if (!CATEGORY_META[category]) {
      window.location.replace('index.html');
      throw new Error('Invalid category parameter');
    }

    const categoryTitle = document.getElementById('categoryTitle');
    const uploadForm = document.getElementById('uploadForm');
    const saveMsg = document.getElementById('saveMsg');
    const entryList = document.getElementById('entryList');

    categoryTitle.textContent = CATEGORY_META[category].label;

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(UPLOAD_STORE)) {
            const uploadStore = db.createObjectStore(UPLOAD_STORE, { keyPath: 'id' });
            uploadStore.createIndex('category', 'category', { unique: false });
            uploadStore.createIndex('date', 'date', { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function withStore(mode, handler) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(UPLOAD_STORE, mode);
        const store = tx.objectStore(UPLOAD_STORE);

        let result;
        try {
          result = handler(store);
        } catch (error) {
          reject(error);
          return;
        }

        tx.oncomplete = () => resolve(result);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadEntries() {
      try {
        const db = await openDatabase();
        const uploads = await new Promise((resolve, reject) => {
          const tx = db.transaction(UPLOAD_STORE, 'readonly');
          const store = tx.objectStore(UPLOAD_STORE);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });

        const merged = [...STATIC_ENTRIES, ...uploads]
          .filter((entry) => entry.category === category)
          .map((entry) => ({
            ...entry,
            description: entry.description || '설명이 없습니다.'
          }));

        merged.sort((a, b) => {
          const dateCompare = String(b.date || '').localeCompare(String(a.date || ''));
          if (dateCompare !== 0) {
            return dateCompare;
          }
          return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
        });

        return merged;
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    async function saveEntry(entry) {
      await withStore('readwrite', (store) => store.put(entry));
    }

    async function deleteEntry(id) {
      await withStore('readwrite', (store) => store.delete(id));
    }

    function setMessage(text, isError = false) {
      saveMsg.textContent = text;
      saveMsg.style.color = isError ? '#b03636' : '#4f6183';
    }

    function isAllowedFile(name) {
      const lower = String(name || '').toLowerCase();
      return lower.endsWith('.pdf') || lower.endsWith('.ppt') || lower.endsWith('.pptx');
    }

    function createEntryNode(entry) {
      const card = document.createElement('article');
      card.className = 'entry-card';

      const meta = document.createElement('p');
      meta.className = 'entry-meta';
      meta.textContent = `${entry.date || '-'} · ${entry.presenter || '-'}`;

      const title = document.createElement('h2');
      title.className = 'entry-title';
      title.textContent = entry.title || '(제목 없음)';

      const desc = document.createElement('p');
      desc.className = 'entry-desc';
      desc.textContent = entry.description || '';

      const file = document.createElement('p');
      file.className = 'entry-file';
      file.textContent = `파일: ${entry.fileName || '-'}`;

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      if (entry.kind === 'seed' && entry.staticLink) {
        const viewLink = document.createElement('a');
        viewLink.href = entry.staticLink;
        viewLink.target = '_blank';
        viewLink.rel = 'noreferrer noopener';
        viewLink.textContent = '세션 보기';
        actions.appendChild(viewLink);
      }

      if (entry.kind === 'upload' && entry.fileBlob) {
        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.textContent = '파일 열기';
        openBtn.addEventListener('click', () => {
          const url = URL.createObjectURL(entry.fileBlob);
          window.open(url, '_blank', 'noopener,noreferrer');
          setTimeout(() => URL.revokeObjectURL(url), 8000);
        });
        actions.appendChild(openBtn);

        const downloadBtn = document.createElement('button');
        downloadBtn.type = 'button';
        downloadBtn.textContent = '다운로드';
        downloadBtn.addEventListener('click', () => {
          const url = URL.createObjectURL(entry.fileBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = entry.fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 8000);
        });
        actions.appendChild(downloadBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.textContent = '삭제';
        deleteBtn.className = 'delete-btn';
        deleteBtn.addEventListener('click', async () => {
          const ok = window.confirm('이 항목을 삭제할까요?');
          if (!ok) {
            return;
          }
          await deleteEntry(entry.id);
          await renderEntries();
        });
        actions.appendChild(deleteBtn);
      }

      card.append(meta, title, desc, file, actions);
      return card;
    }

    async function renderEntries() {
      const entries = await loadEntries();
      entryList.innerHTML = '';

      if (entries.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'entry-empty';
        empty.textContent = '아직 저장된 항목이 없습니다.';
        entryList.appendChild(empty);
        return;
      }

      entries.forEach((entry) => {
        entryList.appendChild(createEntryNode(entry));
      });
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(uploadForm);
      const date = String(formData.get('date') || '').trim();
      const presenter = String(formData.get('presenter') || '').trim();
      const title = String(formData.get('title') || '').trim();
      const description = String(formData.get('description') || '').trim();
      const file = formData.get('file');

      if (!date || !presenter || !title || !description || !(file instanceof File) || !file.name) {
        setMessage('모든 항목을 입력해 주세요.', true);
        return;
      }

      if (!isAllowedFile(file.name)) {
        setMessage('PDF, PPT, PPTX 파일만 업로드할 수 있습니다.', true);
        return;
      }

      const entry = {
        id: crypto.randomUUID(),
        category,
        date,
        presenter,
        title,
        description,
        fileName: file.name,
        fileBlob: file,
        kind: 'upload',
        createdAt: new Date().toISOString()
      };

      try {
        await saveEntry(entry);
        setMessage('저장되었습니다. 메인 페이지에서도 미리보기로 확인할 수 있습니다.');
        uploadForm.reset();
        await renderEntries();
      } catch (error) {
        console.error(error);
        setMessage('저장 중 오류가 발생했습니다.', true);
      }
    });

    document.getElementById('pageTitle').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderEntries();
  </script>
</body>
</html>
