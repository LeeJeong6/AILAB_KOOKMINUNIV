<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Seminar Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary: #6A7C9C;
      --color-dark: #151D2A;
      --color-text: #000000;
      --color-text-secondary: #757575;
      --color-bg: #FFFFFF;
      --color-bg-secondary: #F7F7F7;
      --color-accent: #116dff;
      --color-border: #C7C7C7;

      --site-width: 980px;
      --border-radius: 5px;
      --shadow: 0 1px 4px rgba(0,0,0,.6);
      --transition: 0.4s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.4em;
    }

    .header {
      width: 100%;
      background: var(--color-bg);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-dark);
      margin: 0;
    }

    .lab-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: var(--color-primary);
      color: var(--color-bg);
      border-radius: var(--border-radius);
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background-color var(--transition);
    }

    .lab-link:hover {
      background: var(--color-dark);
    }

    .container {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 0 1rem;
    }

    .hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .page-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 0.5rem;
    }

    .page-desc {
      font-size: 1.125rem;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .main {
      padding: 2rem 0 4rem;
    }

    .section {
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--color-border);
    }

    .category-list {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .category-link {
      text-decoration: none;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      padding: 1.5rem;
      transition: all var(--transition);
      display: block;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    .category-link:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: var(--color-primary);
    }

    .category-name {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 0.75rem;
    }

    .category-desc {
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .preview-list {
      display: grid;
      gap: 1rem;
    }

    .preview-group {
      margin-bottom: 2rem;
    }

    .preview-group h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }

    .preview-card {
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      padding: 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    .preview-meta {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.5rem;
    }

    .preview-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--color-dark);
      margin-bottom: 0.5rem;
    }

    .preview-desc {
      font-size: 0.95rem;
      color: var(--color-text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .preview-empty {
      border: 1px dashed var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg-secondary);
      padding: 1.25rem;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
      text-align: center;
    }

    .preview-more {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      font-size: 0.9rem;
      color: var(--color-accent);
      font-weight: 500;
      transition: color var(--transition);
    }

    .preview-more:hover {
      color: var(--color-primary);
    }

    footer {
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.85rem;
      padding: 2rem 1rem;
      background: var(--color-bg-secondary);
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .page-title {
        font-size: 1.75rem;
      }

      .category-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="site-title">Lab Seminar Archive</h1>
      <a class="lab-link" href="https://ailab.kookmin.ac.kr/" target="_blank" rel="noreferrer noopener">KMU AI LAB</a>
    </div>
  </header>

  <div class="hero container">
    <h2 class="page-title">연구실 세미나 자료</h2>
    <p class="page-desc">논문 발표, 바이브코딩, 수학스터디 자료를 정리한 아카이브입니다.</p>
  </div>

  <main class="container main">
    <section class="section">
      <h2 class="section-title">카테고리</h2>
      <div class="category-list">
        <a class="category-link" href="category.html?cat=paper">
          <h3 class="category-name">논문 세미나</h3>
          <p class="category-desc">논문 발표 자료와 요약 노트를 모아두는 공간입니다.</p>
        </a>

        <a class="category-link" href="category.html?cat=vibe">
          <h3 class="category-name">바이브코딩</h3>
          <p class="category-desc">실습 중심 코드 발표와 구현 데모 자료를 업로드하고 관리하는 공간입니다.</p>
        </a>

        <a class="category-link" href="category.html?cat=math">
          <h3 class="category-name">수학스터디</h3>
          <p class="category-desc">수식 유도와 개념 정리 자료를 정리하는 공간입니다.</p>
        </a>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">최근 업로드</h2>
      <div id="previewBoard"></div>
    </section>
  </main>

  <footer>
    &copy; 2026 KMU AI Lab. All rights reserved.
  </footer>

  <script>
    const CATEGORY_META = {
      paper: { label: '논문 세미나', link: 'category.html?cat=paper' },
      vibe: { label: '바이브코딩', link: 'category.html?cat=vibe' },
      math: { label: '수학스터디', link: 'category.html?cat=math' }
    };

    const STATIC_ENTRIES = [
      {
        id: 'seed-paper-2026-03-20',
        category: 'paper',
        date: '2026-03-20',
        presenter: '이정익',
        title: 'GroupViT: Semantic Segmentation Emerges from Text Supervision',
        description: '텍스트 감독만으로 시맨틱 분할 성능을 확보하는 GroupViT 핵심 아이디어를 정리한 발표.',
        kind: 'seed',
        createdAt: '2026-03-20T09:00:00.000Z'
      }
    ];

    const previewBoard = document.getElementById('previewBoard');

    function mergeEntriesByCategory(entries, category) {
      const merged = [...STATIC_ENTRIES, ...entries]
        .filter((entry) => entry.category === category)
        .map((entry) => ({
          ...entry,
          description: entry.description || '설명이 없습니다.'
        }));

      merged.sort((a, b) => {
        const dateCompare = String(b.date || '').localeCompare(String(a.date || ''));
        if (dateCompare !== 0) {
          return dateCompare;
        }
        return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      });

      return merged;
    }

    function previewCard(entry) {
      return `
        <article class="preview-card">
          <div class="preview-meta">${entry.date || '-'} · ${entry.presenter || '-'}</div>
          <h4 class="preview-title">${escapeHtml(entry.title || '(제목 없음)')}</h4>
          <p class="preview-desc">${escapeHtml(entry.description || '')}</p>
        </article>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderPreviewBoard() {
      const entries = [];
      previewBoard.innerHTML = '';

      Object.keys(CATEGORY_META).forEach((categoryKey) => {
        const category = CATEGORY_META[categoryKey];
        const categoryEntries = mergeEntriesByCategory(entries, categoryKey).slice(0, 3);

        const wrapper = document.createElement('section');
        wrapper.className = 'preview-group';

        const title = document.createElement('h3');
        title.textContent = category.label;

        const list = document.createElement('div');
        list.className = 'preview-list';

        if (categoryEntries.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'preview-empty';
          empty.textContent = '아직 업로드된 항목이 없습니다.';
          list.appendChild(empty);
        } else {
          list.innerHTML = categoryEntries.map(previewCard).join('');
        }

        const moreLink = document.createElement('a');
        moreLink.className = 'preview-more';
        moreLink.href = category.link;
        moreLink.textContent = '더 보기 →';

        wrapper.append(title, list, moreLink);
        previewBoard.appendChild(wrapper);
      });
    }

    renderPreviewBoard();
  </script>
</body>
</html>
