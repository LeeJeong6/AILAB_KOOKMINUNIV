<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Seminar Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2563eb;
      --blue-soft: #eff5ff;
      --blue-line: #c7d8ff;
      --ink: #19202c;
      --muted: #61708a;
      --white: #ffffff;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--white);
      color: var(--ink);
      font-family: 'Gowun Dodum', sans-serif;
      scroll-behavior: smooth;
    }

    .top-ribbon {
      width: 100%;
      height: 84px;
      background: linear-gradient(90deg, #1f4fd0, #2f7dff);
    }

    .container {
      width: min(980px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .hero {
      margin-top: -42px;
      text-align: center;
      padding-bottom: 1.1rem;
    }

    .page-title {
      font-family: 'Gaegu', cursive;
      font-size: clamp(2.2rem, 5.2vw, 3.5rem);
      font-weight: 700;
      background: #fff;
      border: 2px solid #d4e2ff;
      border-radius: 999px;
      padding: 0.62rem 1.65rem;
      color: #17306e;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.14);
    }

    .lab-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-top: 1rem;
      text-decoration: none;
      background: var(--blue);
      color: #fff;
      border-radius: 12px;
      padding: 0.72rem 2rem;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .lab-link:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .main {
      padding: 1.2rem 0 4rem;
      display: grid;
      gap: 2.1rem;
    }

    .section-title {
      font-family: 'Gaegu', cursive;
      font-size: clamp(1.6rem, 3.2vw, 2.3rem);
      margin-bottom: 0.9rem;
      color: #1e3a8a;
    }

    .category-list {
      display: grid;
      gap: 0.9rem;
    }

    .category-link {
      text-decoration: none;
      border: 2px solid var(--blue-line);
      border-radius: var(--radius);
      background: var(--blue-soft);
      padding: 1.2rem 1.3rem;
      transition: transform 0.16s ease, border-color 0.16s ease;
      display: grid;
      gap: 0.45rem;
      min-height: 132px;
    }

    .category-link:hover {
      transform: translateY(-2px);
      border-color: #6d95f8;
    }

    .category-name {
      font-family: 'Gaegu', cursive;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #1945b4;
      line-height: 1;
    }

    .category-desc {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
      max-width: 70ch;
    }

    .preview-board {
      border: 1px solid #d9e5ff;
      border-radius: var(--radius);
      background: #fafcff;
      padding: 1rem;
      display: grid;
      gap: 1.2rem;
    }

    .preview-group {
      display: grid;
      gap: 0.62rem;
    }

    .preview-group h3 {
      font-family: 'Gaegu', cursive;
      font-size: 1.9rem;
      color: #1f4fb6;
      line-height: 1;
    }

    .preview-list {
      display: grid;
      gap: 0.58rem;
    }

    .preview-card {
      border: 1px solid #d8e2f8;
      border-radius: 12px;
      background: #fff;
      padding: 0.72rem 0.84rem;
      display: grid;
      gap: 0.35rem;
    }

    .preview-meta {
      font-size: 0.83rem;
      color: #6c7a94;
    }

    .preview-title {
      font-size: 1.04rem;
      font-weight: 700;
      line-height: 1.35;
      color: #1d2a43;
    }

    .preview-desc {
      font-size: 0.92rem;
      color: #3f4f67;
      line-height: 1.42;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .preview-empty {
      border: 1px dashed #cfdcf8;
      border-radius: 10px;
      background: #fff;
      padding: 0.72rem 0.84rem;
      color: #6e7c96;
      font-size: 0.9rem;
    }

    .preview-more {
      width: fit-content;
      text-decoration: none;
      font-size: 0.86rem;
      color: #1f4fb6;
      border: 1px solid #a8c0ff;
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      background: #f4f8ff;
    }

    footer {
      border-top: 1px solid #dce7ff;
      text-align: center;
      color: #70809b;
      font-size: 0.82rem;
      padding: 1rem 0 1.35rem;
      font-family: 'Gowun Dodum', sans-serif;
    }

    @media (max-width: 640px) {
      .container {
        width: min(980px, calc(100% - 1.1rem));
      }

      .page-title {
        padding: 0.58rem 1.1rem;
      }

      .category-link {
        min-height: 118px;
      }

      .preview-group h3 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div id="pageTop"></div>
  <div class="top-ribbon"></div>

  <header class="container hero">
    <button type="button" class="page-title" id="pageTitle">Lab Seminar Archive</button>
    <div>
      <a class="lab-link" href="https://ailab.kookmin.ac.kr/" target="_blank" rel="noreferrer noopener">KMU AI LAB</a>
    </div>
  </header>

  <main class="container main">
    <section>
      <h2 class="section-title">Category</h2>
      <div class="category-list">
        <a class="category-link" href="category.html?cat=paper">
          <h3 class="category-name">논문 세미나</h3>
          <p class="category-desc">논문 발표 자료와 요약 노트를 모아두는 공간입니다. 클릭하면 별도 페이지로 이동합니다.</p>
        </a>

        <a class="category-link" href="category.html?cat=vibe">
          <h3 class="category-name">바이브코딩</h3>
          <p class="category-desc">실습 중심 코드 발표와 구현 데모 자료를 업로드하고 관리하는 공간입니다.</p>
        </a>

        <a class="category-link" href="category.html?cat=math">
          <h3 class="category-name">수학스터디</h3>
          <p class="category-desc">수식 유도와 개념 정리 자료를 정리하는 공간입니다.</p>
        </a>
      </div>
    </section>

    <section>
      <h2 class="section-title">Preview</h2>
      <div class="preview-board" id="previewBoard"></div>
    </section>
  </main>

  <footer>
    &copy; 2026 KMU AI Lab Seminar Archive
  </footer>

  <script>
    const DB_NAME = 'lab-seminar-archive-db';
    const DB_VERSION = 1;
    const UPLOAD_STORE = 'uploads';

    const CATEGORY_META = {
      paper: { label: '논문 세미나', link: 'category.html?cat=paper' },
      vibe: { label: '바이브코딩', link: 'category.html?cat=vibe' },
      math: { label: '수학스터디', link: 'category.html?cat=math' }
    };

    const STATIC_ENTRIES = [
      {
        id: 'seed-paper-2026-03-20',
        category: 'paper',
        date: '2026-03-20',
        presenter: '이정익',
        title: 'GroupViT: Semantic Segmentation Emerges from Text Supervision',
        description: '텍스트 감독만으로 시맨틱 분할 성능을 확보하는 GroupViT 핵심 아이디어를 정리한 발표.',
        kind: 'seed',
        createdAt: '2026-03-20T09:00:00.000Z'
      }
    ];

    const previewBoard = document.getElementById('previewBoard');

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(UPLOAD_STORE)) {
            const uploadStore = db.createObjectStore(UPLOAD_STORE, { keyPath: 'id' });
            uploadStore.createIndex('category', 'category', { unique: false });
            uploadStore.createIndex('date', 'date', { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function loadUploads() {
      try {
        const db = await openDatabase();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(UPLOAD_STORE, 'readonly');
          const store = tx.objectStore(UPLOAD_STORE);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    function mergeEntriesByCategory(entries, category) {
      const merged = [...STATIC_ENTRIES, ...entries]
        .filter((entry) => entry.category === category)
        .map((entry) => ({
          ...entry,
          description: entry.description || '설명이 없습니다.'
        }));

      merged.sort((a, b) => {
        const dateCompare = String(b.date || '').localeCompare(String(a.date || ''));
        if (dateCompare !== 0) {
          return dateCompare;
        }
        return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      });

      return merged;
    }

    function previewCard(entry) {
      return `
        <article class="preview-card">
          <div class="preview-meta">${entry.date || '-'} · ${entry.presenter || '-'}</div>
          <h4 class="preview-title">${escapeHtml(entry.title || '(제목 없음)')}</h4>
          <p class="preview-desc">${escapeHtml(entry.description || '')}</p>
        </article>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function renderPreviewBoard() {
      const uploads = await loadUploads();
      previewBoard.innerHTML = '';

      Object.keys(CATEGORY_META).forEach((categoryKey) => {
        const category = CATEGORY_META[categoryKey];
        const entries = mergeEntriesByCategory(uploads, categoryKey).slice(0, 3);

        const wrapper = document.createElement('section');
        wrapper.className = 'preview-group';

        const title = document.createElement('h3');
        title.textContent = category.label;

        const list = document.createElement('div');
        list.className = 'preview-list';

        if (entries.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'preview-empty';
          empty.textContent = '아직 업로드된 항목이 없습니다.';
          list.appendChild(empty);
        } else {
          list.innerHTML = entries.map(previewCard).join('');
        }

        const moreLink = document.createElement('a');
        moreLink.className = 'preview-more';
        moreLink.href = category.link;
        moreLink.textContent = '카테고리 페이지로 이동';

        wrapper.append(title, list, moreLink);
        previewBoard.appendChild(wrapper);
      });
    }

    document.getElementById('pageTitle').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderPreviewBoard();
  </script>
</body>
</html>
